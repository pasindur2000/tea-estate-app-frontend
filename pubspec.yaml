name: tea_state_app
description: "TeaState — Tea Estate Management Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.0.0

  # Navigation
  go_router: ^14.0.0

  # State management & storage
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # fonts can be added here for custom local fonts if needed
